# captain-mast production config
# Adjust paths and credentials to match your deployment.

# mTLS on 8883 – every client must present a cert signed by cafile.
listener 8883
cafile              /etc/captain-mast/certs/ca-bundle.crt
certfile            /etc/captain-mast/certs/broker.crt
keyfile             /etc/captain-mast/certs/broker.key
require_certificate true

# Optional: plain TLS on 8884 for dashboard/web clients (cert not required).
# listener 8884
# certfile /etc/captain-mast/certs/broker.crt
# keyfile  /etc/captain-mast/certs/broker.key

# Authentication – cert + password.
password_file /etc/captain-mast/passwd
acl_file      /etc/captain-mast/acl
allow_anonymous false

log_level info
log_dest  stdout
# log_dest file /var/log/captain-mast/broker.log

persistence true
persistence_location /var/lib/captain-mast/

max_connections -1
max_inflight_messages 20
max_queued_messages 1000

# Hugging Face threat detection (optional).
hf_enabled false
# hf_api_key    hf_xxxxxxxxxxxxxxxxxxxx
# hf_model      facebook/bart-large-mnli
# hf_analysis_interval 30
# hf_threat_threshold  0.75
