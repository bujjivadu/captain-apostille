# captain-apostille production config
# Adjust paths to match your installation (see deploy/ec2-install.sh).

ca_cert     /etc/captain-apostille/ca/intermediate.crt
ca_key      /etc/captain-apostille/ca/intermediate.key
ca_chain    /etc/captain-apostille/ca/root.crt

# Use a Let's Encrypt cert here so ESP32/device clients trust the enrollment
# endpoint without needing the Muca CA bundle pre-installed.
listen      0.0.0.0:8443
server_cert /etc/captain-apostille/server.crt
server_key  /etc/captain-apostille/server.key

org_name                "Your Org Name"
operational_ttl_days    365
bootstrap_ttl_hours     24
