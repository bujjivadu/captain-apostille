# captain-apostille configuration

# ── Certificate Authority ──────────────────────────────────────────────────────
#
# Use the intermediate CA for signing (never the root).
# Generate with: captain-apostille ca init

ca_cert         /etc/captain-apostille/ca/intermediate.crt
ca_key          /etc/captain-apostille/ca/intermediate.key
ca_chain        /etc/captain-apostille/ca/root.crt

# ── Enrollment endpoint ────────────────────────────────────────────────────────
#
# Use a Let's Encrypt cert here so ESP32 devices trust the enrollment server
# without needing a custom CA bundle just to talk to us.
# Renewal: certbot renew (or rustls-acme integration, coming in v2)

listen          0.0.0.0:8443
server_cert     /etc/captain-apostille/server.crt
server_key      /etc/captain-apostille/server.key

# ── Certificate policy ─────────────────────────────────────────────────────────

org_name                Serpentine Labs
operational_ttl_days    365
bootstrap_ttl_hours     24
